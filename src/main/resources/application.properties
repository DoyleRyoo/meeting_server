spring.application.name=damlok_backend

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

ai.server.base-url=${AI_SERVER_BASE_URL:http://localhost:9000}

notion.api.base-url=${NOTION_API_BASE_URL:https://app.notion.com/p/1b5bf74b7582829bbb7901052a9766cc}
notion.api.token=${NOTION_API_TOKEN:}
notion.api.version=${NOTION_API_VERSION:2022-06-28}
notion.summary.parent-page-id=${NOTION_SUMMARY_PARENT_PAGE_ID:}
notion.action-item.database-id=${NOTION_ACTION_ITEM_DATABASE_ID:}
